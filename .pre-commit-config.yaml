# https://pre-commit.com
default_install_hook_types: [commit-msg, pre-commit]
default_stages: [pre-commit, manual]
fail_fast: true
repos:
  - repo: meta
    hooks:
      - id: check-useless-excludes
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-mock-methods
      - id: python-use-type-annotations
      - id: rst-backticks
      - id: rst-directive-colons
      - id: rst-inline-touching-normal
      - id: text-unicode-replacement-char
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
        types: [python]
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: name-tests-test
        args: [--pytest-test-first]
      - id: trailing-whitespace
        types: [python]
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: commitizen
        name: commitizen
        entry: uv run --no-sync cz check
        args: [--commit-msg-file]
        require_serial: true
        language: system
        stages: [commit-msg]
      - id: ruff-check
        name: ruff check
        entry: uv run --no-sync ruff check
        args: ["--force-exclude", "--extend-fixable=ERA001,F401,F841,T201,T203"]
        require_serial: true
        language: system
        files: ^(src|tests|scripts)/
        types_or: [python, pyi]
      - id: ruff-check-notebooks
        name: ruff check notebooks
        entry: uv run --no-sync ruff check
        args: [--force-exclude]
        require_serial: true
        language: system
        files: ^notebooks/.*\.ipynb$
      - id: codespell
        name: codespell
        entry: uv run --no-sync codespell
        require_serial: true
        language: system
        types_or: [markdown, python, pyi, toml, yaml]
      - id: ruff-format
        name: ruff format
        entry: uv run --no-sync ruff format
        args: [--force-exclude]
        require_serial: true
        language: system
        files: ^(src|tests|scripts)/
        types_or: [python, pyi]
      - id: ty
        name: ty
        entry: uv run --no-sync ty check
        require_serial: true
        language: system
        files: ^(src|tests|scripts)/
        types_or: [python, pyi]
